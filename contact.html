<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อเรา | EcoPure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-800">EcoPure</div>
            <nav>
                <ul class="flex space-x-6">
                    <li><a href="index.html" class="hover:text-blue-600">หน้าแรก</a></li>
                    <li><a href="contact.html" class="font-bold text-blue-700 border-b-2 border-blue-700">ติดต่อเรา</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex justify-center">
        <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-lg border border-gray-100">
            <h2 class="text-3xl font-bold text-center text-blue-900 mb-8">ติดต่อสอบถามข้อมูล</h2>
            
            <!-- เชื่อมต่อฟอร์มเข้ากับ Formspree ด้วย Endpoint ของคุณ -->
            <form action="https://formspree.io/f/mnjkdkdq" method="POST" class="space-y-6">
                
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ติดต่อ</label>
                    <input type="text" id="name" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" name="phone" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 mb-1">ข้อความเพิ่มเติม</label>
                    <textarea id="message" name="message" rows="4" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-3 rounded-lg shadow-md transition duration-300">
                    ส่งข้อความ
                </button>
            </form>
        </div>
    </main>

    <footer class="mt-auto py-8">
        <p class="text-center text-gray-500 text-sm">&copy; 2026 EcoPure Water Tech. All Rights Reserved.</p>
    </footer>

</body>
</html>

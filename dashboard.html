<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f4f8; }
        /* ปรับอนิเมชันให้ช้าลงเป็น 7 วินาที */
        .filter-bar { transition: height 7s ease-in-out; }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Smart Water Monitor</h1>
            <p class="text-slate-500">ระบบตรวจสอบและบำบัดน้ำเสียอัจฉริยะ</p>
        </div>
        <div class="flex gap-3">
            <a href="index.html" class="bg-slate-100 text-slate-600 px-6 py-2 rounded-xl font-semibold hover:bg-slate-200 transition flex items-center">
                🏠 หน้าแรก
            </a>
            <button onclick="location.reload()" class="bg-rose-50 text-rose-600 px-6 py-2 rounded-xl font-semibold hover:bg-rose-100 transition">🛑 ปิดระบบ</button>
            <button onclick="startSystem()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-semibold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">▶ เริ่มการบำบัด</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">1. เลือกแหล่งกำเนิดน้ำเสีย</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="selectWater(this, 5.6, 155, 75, 'น้ำเสียจากครัวเรือน', 'พบสารแขวนลอยและแอมโมเนีย')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🏠 น้ำเสียจากครัวเรือน</p>
                    </button>
                    <button onclick="selectWater(this, 6.3, 85, 45, 'บ่อพักน้ำโรงเรียน', 'น้ำขังเน่าเสียจากใบไม้')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🏫 บ่อพักน้ำโรงเรียน</p>
                    </button>
                    <button onclick="selectWater(this, 5.0, 210, 30, 'น้ำจากแปลงเกษตร', 'มีการปนเปื้อนปุ๋ย')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🌱 น้ำระบายจากแปลงเกษตร</p>
                    </button>
                    <button onclick="selectWater(this, 5.9, 360, 90, 'น้ำคลองในเมือง', 'น้ำเสียจากท่อระบายน้ำ')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🚣 น้ำคลองในเมือง</p>
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">

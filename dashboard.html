<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm border">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Smart Water Monitor Dashboard</h1>
            <div class="flex gap-2">
                <button onclick="startSystem()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700">▶ เริ่มการบำบัด</button>
                <button onclick="stopSystem()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-600">🛑 ปิดเครื่อง</button>
                <button onclick="pauseSystem()" class="bg-amber-400 text-white px-4 py-2 rounded-lg font-bold hover:bg-amber-500">⏸ หยุดชั่วคราว</button>
            </div>
        </div>

        <div id="selector" class="space-y-4 mb-8">
            <div onclick="updateDashboard(this, 5.6, 155)" class="source-card cursor-pointer border-2 border-blue-600 bg-blue-50 p-4 rounded-xl transition">
                <span class="font-bold">🏠 น้ำเสียจากครัวเรือน (Graywater)</span>
                <p class="text-sm text-slate-600">pH: 5.6 | ความขุ่น: 155 NTU</p>
            </div>
            <div onclick="updateDashboard(this, 4.2, 480)" class="source-card cursor-pointer border border-slate-200 p-4 rounded-xl hover:border-blue-300 transition">
                <span class="font-bold">🍳 น้ำทิ้งร้านอาหารปนเปื้อนไขมัน</span>
                <p class="text-sm text-slate-600">pH: 4.2 | ความขุ่น: 480 NTU</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-orange-50 p-6 rounded-xl border border-orange-100">
                <p class="text-sm text-orange-700 font-bold">ค่าความเป็นกรด-ด่าง (pH)</p>
                <p id="display-ph" class="text-3xl font-bold">5.6</p>
            </div>
            <div class="bg-yellow-50 p-6 rounded-xl border border-yellow-100">
                <p class="text-sm text-yellow-700 font-bold">ความขุ่น (Turbidity)</p>
                <p id="display-turb" class="text-3xl font-bold">155.0</p>
            </div>
        </div>
    </div>

    <script>
        function startSystem() { alert("ระบบเริ่มทำงาน: กำลังบำบัดน้ำ..."); }
        function stopSystem() { alert("ระบบปิดการทำงานแล้ว"); }
        function pauseSystem() { alert("หยุดชั่วคราว"); }

        function updateDashboard(element, ph, turb) {
            document.getElementById('display-ph').innerText = ph;
            document.getElementById('display-turb').innerText = turb;

            document.querySelectorAll('.source-card').forEach(card => {
                card.className = "source-card cursor-pointer border border-slate-200 p-4 rounded-xl hover:border-blue-300 transition";
            });
            element.className = "source-card cursor-pointer border-2 border-blue-600 bg-blue-50 p-4 rounded-xl transition";
        }
    </script>
</body>
</html>

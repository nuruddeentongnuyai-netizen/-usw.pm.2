<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f1f5f9; }
        .glass-card { background: white; border: 1px solid #e2e8f0; }
        .filter-bar { transition: height 7s ease-in-out; }
    </style>
</head>
<body class="p-8">

<div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Smart Water Monitor</h1>
            <p class="text-slate-500">ระบบตรวจสอบและบำบัดน้ำเสียอัจฉริยะ</p>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-rose-50 text-rose-600 px-6 py-2 rounded-xl font-semibold hover:bg-rose-100 transition">🛑 ปิดระบบ</button>
            <button onclick="startSystem()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-semibold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">▶ เริ่มการบำบัด</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <section class="glass-card p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">1. เลือกแหล่งกำเนิดน้ำเสีย</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button class="text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 hover:bg-blue-50 transition">
                        <p class="font-bold text-slate-800">🏠 น้ำเสียจากครัวเรือน</p>
                    </button>
                </div>
            </section>

            <section class="glass-card p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-semibold mb-6 text-slate-700">2. แอนิเมชันห้องกรองเครื่องบำบัด</h2>
                <div class="flex justify-between items-end h-40 bg-slate-50 rounded-2xl p-6 mb-6">
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl"><div id="barA" class="filter-bar w-full bg-slate-500 h-0 rounded-xl"></div></div><p class="text-xs mt-3 font-bold">SEDIMENT</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl"><div id="barB" class="filter-bar w-full bg-teal-400 h-0 rounded-xl"></div></div><p class="text-xs mt-3 font-bold">CARBON</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl"><div id="barC" class="filter-bar w-full bg-blue-500 h-0 rounded-xl"></div></div><p class="text-xs mt-3 font-bold">UV / OUT</p></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-4 rounded-xl border"><p class="text-xs font-bold text-slate-400 mb-1">ข้อมูลขาเข้า (Input)</p><p class="text-sm text-slate-700">กรุณาเลือกแหล่งน้ำเสีย</p></div>
                    <div class="bg-slate-50 p-4 rounded-xl border"><p class="text-xs font-bold text-green-600 mb-1">ผลลัพธ์ (Output)</p><p class="text-sm text-slate-700">รอการบำบัด...</p></div>
                </div>
            </section>
        </div>

        <aside class="space-y-4">
            <h2 class="text-lg font-semibold text-slate-700 mb-2">3. แผงวัดค่าข้อมูล</h2>
            <div class="glass-card p-5 rounded-2xl shadow-sm"><p class="text-xs text-slate-400">ค่า pH</p><p class="text-3xl font-bold text-slate-800">0.0</p></div>
            <div class="glass-card p-5 rounded-2xl shadow-sm"><p class="text-xs text-slate-400">ความขุ่น (NTU)</p><p class="text-3xl font-bold text-slate-800">0</p></div>
            <div class="glass-card p-5 rounded-2xl shadow-sm"><p class="text-xs text-slate-400">ดัชนีกลิ่นเหม็น</p><p class="text-3xl font-bold text-slate-800">0%</p></div>
        </aside>
    </div>
</div>

</body>
</html>

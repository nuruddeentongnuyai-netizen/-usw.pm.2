<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- Header เหมือนกับหน้าหลัก -->
    <header class="bg-white shadow-sm sticky top-0 z-[1000]">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-800">EcoPure</div>
            <nav>
                <ul class="flex items-center space-x-6 text-sm font-medium text-gray-700">
                    <li><a href="index.html" class="hover:text-blue-600 transition">หน้าแรก</a></li>
                    <li><a href="features.html" class="hover:text-blue-600 transition">คุณสมบัติ</a></li>
                    <li><a href="products.html" class="text-blue-700 border-b-2 border-blue-700 pb-1">สินค้าของพวกเรา</a></li>

                    <li><a href="contact.html" class="hover:text-blue-600 transition">ติดต่อเรา</a></li>

                </ul>
            </nav>
        </div>

    <!-- Main Content พร้อมพื้นหลังแบบหน้าแรก -->
    <main class="relative flex-grow flex flex-col items-center justify-center overflow-hidden py-16 bg-cover bg-center"

            <div class="grid md:grid-cols-2 gap-8">
                <!-- สินค้า 1 -->
                <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl border border-white/20">
                    <h3 class="text-2xl font-bold mb-4">EcoPure Compact</h3>
                    <p class="text-gray-200">เหมาะสำหรับชุมชนและโรงงานขนาดเล็ก ระบบกะทัดรัด ประสิทธิภาพสูง</p>
                </div>
                <!-- สินค้า 2 -->

                    <p class="text-gray-200">ระบบบำบัดน้ำเสียอุตสาหกรรมขนาดใหญ่ รองรับงานหนัก พร้อมระบบมอนิเตอร์อัจฉริยะ</p>

            </div>

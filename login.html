<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPure - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
        
        <div id="loginForm">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">เข้าสู่ระบบผู้ดูแล</h2>
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" class="w-full p-3 border mb-4 rounded-lg">
            <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full p-3 border mb-4 rounded-lg">
            <button onclick="checkLogin()" class="w-full bg-blue-800 text-white py-3 rounded-lg font-bold hover:bg-blue-900 transition">เข้าสู่ระบบ</button>
            <p class="mt-4 text-center text-sm text-gray-600">ยังไม่มีบัญชี? <a onclick="toggleForm()" class="text-blue-600 font-bold cursor-pointer underline">สมัครสมาชิกใหม่</a></p>
        </div>

        <div id="registerForm" class="hidden">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">สมัครสมาชิกใหม่</h2>
            <input type="text" id="regUser" placeholder="ตั้งชื่อผู้ใช้งาน" class="w-full p-3 border mb-4 rounded-lg">
            <input type="password" id="regPass" placeholder="ตั้งรหัสผ่าน" class="w-full p-3 border mb-4 rounded-lg">
            <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">ลงทะเบียน</button>
            <p class="mt-4 text-center text-sm text-gray-600">มีบัญชีอยู่แล้ว? <a onclick="toggleForm()" class="text-blue-600 font-bold cursor-pointer underline">เข้าสู่ระบบ</a></p>
        </div>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        function handleRegister() {
            var user = document.getElementById('regUser').value.trim();
            var pass = document.getElementById('regPass').value;
            if(user && pass) {
                localStorage.setItem("storedUser", user);
                localStorage.setItem("storedPass", pass);
                alert("สมัครสมาชิกสำเร็จ!");
                toggleForm();
            } else {
                alert("กรุณากรอกข้อมูลให้ครบ");
            }
        }

        function checkLogin() {
            var user = document.getElementById("username").value.trim();
            var pass = document.getElementById("password").value;
            var storedUser = localStorage.getItem("storedUser");
            var storedPass = localStorage.getItem("storedPass");

            if((user === "admin" && pass === "1234") || (user === storedUser && pass === storedPass)) {
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            }
        }
    </script>
</body>
</html>

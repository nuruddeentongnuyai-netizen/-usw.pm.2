<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPure - เข้าสู่ระบบ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .logo { text-align: center; margin-bottom: 30px; color: #1e3a8a; font-size: 2.2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .input-group input { width: 100%; padding: 15px 12px 15px 45px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 1rem; transition: all 0.3s; background-color: #f8fafc; }
        button { width: 100%; padding: 14px; background: #1e40af; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .error-msg { color: #ef4444; background: #fee2e2; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 0.95rem; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo"><i class="fas fa-leaf" style="color: #2563eb;"></i> EcoPure</div>
        <div id="errorMsg" class="error-msg">❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="รหัสผ่าน">
        </div>
        <button onclick="checkLogin()">เข้าสู่ระบบ</button>
    </div>

    <script>
        function checkLogin() {
            var user = document.getElementById("username").value.trim();
            var pass = document.getElementById("password").value;
            
            // ตรวจสอบล็อกอิน
            if(user === "admin" && pass === "1234") {
                // บันทึกสถานะว่าล็อกอินแล้ว
                localStorage.setItem("isLoggedIn", "true");
                // เด้งไปหน้า Dashboard ทันที
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }
    </script>
</body>
</html>
